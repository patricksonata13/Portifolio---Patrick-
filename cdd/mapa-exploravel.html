<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Mapa da Cidade de Deus</title>

<link rel="stylesheet" href="/assets/css/style.css">

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
}

.mapa{
position:relative;
max-width:900px;
margin:auto;
margin-top:40px;
}

.mapa img{
width:100%;
border-radius:10px;
}

.ponto{
position:absolute;
width:20px;
height:20px;
background:red;
border-radius:50%;
cursor:pointer;
}

.ponto:hover{
transform:scale(1.3);
}

</style>

</head>

<body>

<h1>Mapa da Cidade de Deus</h1>

<div class="mapa">

<img src="/assets/img/mapa-cdd.jpg">

<a href="/cdd/historia/">
<div class="ponto" style="top:40%;left:30%"></div>
</a>

<a href="/cdd/missoes/">
<div class="ponto" style="top:60%;left:50%"></div>
</a>

<a href="/cdd/personagens/">
<div class="ponto" style="top:25%;left:65%"></div>
</a>

</div>

</body>
</html>
